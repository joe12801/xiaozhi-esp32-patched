name: Build Boards

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build bread-compact-wifi
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build variant
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          # 只编译用户的 128x32 型号
          python scripts/release.py bread-compact-wifi --name bread-compact-wifi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_fixed_firmware
          path: build/merged-binary.bin
          if-no-files-found: error
